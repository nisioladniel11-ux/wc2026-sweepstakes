<style>

    --muted:#8FA89A;
    --gf:#34D399;   /* goals scored  */
    --ga:#38BDF8;   /* goals conceded */
    --yc:#FACC15;   /* yellow cards  */
    --rc:#F43F5E;   /* red cards     */
    --shadow:0 10px 30px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:"Archivo",system-ui,-apple-system,sans-serif;

    line-height:1.4;
    padding-bottom:64px;
  }

  .stat.gf .v{color:var(--gf)} .stat.ga .v{color:var(--ga)} .stat.yc .v{color:var(--yc)} .stat.rc .v{color:var(--rc)}
  .chev{flex:0 0 auto;color:var(--muted);transition:transform .2s;font-size:13px;width:14px;text-align:center}
  .card.open .chev{transform:rotate(90deg)}

  .teams{display:none;border-top:1px solid var(--line);padding:4px 0 6px}

  .tier{font-size:10.5px;color:var(--muted);margin-top:1px}

  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;padding:18px;z-index:50}
  .overlay.show{display:flex}

  .modal h3{margin:0 0 4px;font-size:16px}
  .modal p{margin:0 0 10px;font-size:12px;color:var(--muted)}
  textarea{
    width:100%;height:230px;background:var(--bg);color:var(--text);border:1px solid var(--line);
    border-radius:10px;padding:11px;font-family:ui-monospace,Menlo,monospace;font-size:12px;resize:vertical;
  }
  .modal .row{display:flex;gap:8px;margin-top:11px;justify-content:flex-end}
  .toast{
    position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);
    background:var(--raised);border:1px solid var(--line-strong);color:var(--text);
    padding:10px 16px;border-radius:999px;font-size:13px;font-weight:600;
    opacity:0;pointer-events:none;transition:.25s;z-index:60;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    .pstats .stat{min-width:34px}
    .steppers{grid-template-columns:repeat(4,auto);gap:4px}
    .step button{width:21px}
    .flag{font-size:21px}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

function seeded(){const o=blank();Object.keys(SEED).forEach(id=>{if(o[id])o[id]={...o[id],...SEED[id]};});return o;}

function load(){

  if(boardRef){

    boardRef.on("value",snap=>{
      const v=snap.val();

    });
    // seed the shared board once, only if it's still empty
    boardRef.get().then(snap=>{if(!snap.exists())boardRef.set({stats:seeded(),updated:Date.now()});}).catch(()=>{});
  }else{
    render(); // no backend configured -> local preview only
  }
}
function save(){
  lastUpdated=Date.now();
  if(boardRef){boardRef.set({stats,updated:lastUpdated}).catch(e=>console.warn("save failed",e));}
  paintUpdated();
}

function totals(team){return stats[team.id]||{gf:0,ga:0,yc:0,rc:0};}
function playerTotals(p){const o={gf:0,ga:0,yc:0,rc:0};p.teams.forEach(t=>{const s=totals(t);o.gf+=s.gf;o.ga+=s.ga;o.yc+=s.yc;o.rc+=s.rc;});return o;}

function paintLed(){
  const g={gf:0,ga:0,yc:0,rc:0};
  ALL_TEAMS.forEach(t=>{const s=totals(t);g.gf+=s.gf;g.ga+=s.ga;g.yc+=s.yc;g.rc+=s.rc;});
  document.getElementById("led-gf").textContent=g.gf;
  document.getElementById("led-ga").textContent=g.ga;
  document.getElementById("led-yc").textContent=g.yc;
  document.getElementById("led-rc").textContent=g.rc;
}
function paintUpdated(){
  const el=document.getElementById("updated");
  if(!lastUpdated){el.textContent="Not yet updated";return;}
  const d=new Date(lastUpdated);
  el.textContent="Updated "+d.toLocaleDateString(undefined,{day:"numeric",month:"short"})+" "+d.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit"});
}

/* ---------- Sort bar ---------- */
function renderSortbar(){
  const bar=document.getElementById("sortbar");
  if(view==="teams"){bar.innerHTML="";bar.style.display="none";return;}
  bar.style.display="flex";
  bar.innerHTML='<span style="font-size:12px;color:var(--muted);align-self:center;margin-right:2px">Rank by</span>'+
    KEYS.map(([k,label,,col])=>`<button class="chip ${playerSort===k?'active':''}" data-sort="${k}"><span class="sw" style="background:${col}"></span>${label}</button>`).join("");
  bar.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{playerSort=c.dataset.sort;render();});
}

/* ---------- Players view ---------- */
function sortedPlayers(){
  return [...PLAYERS].map(p=>({p,t:playerTotals(p)})).sort((a,b)=>{
    if(playerSort==="ga"||playerSort==="rc"||playerSort==="yc"){ // fewer is "better"? keep descending so most appears top; conceded most at top is interesting
    }
    const diff=b.t[playerSort]-a.t[playerSort];
    if(diff)return diff;
    return b.t.gf-a.t.gf || a.p.name.localeCompare(b.p.name);
  });
}
function renderPlayers(){
  const v=document.getElementById("view");
  const rows=sortedPlayers();
  v.innerHTML=rows.map(({p,t},i)=>{
    const open=openSet.has(p.name);
    const stat=(k,cls)=>`<div class="stat ${cls}"><div class="v">${t[k]}</div><div class="k">${k.toUpperCase()}</div></div>`;
    const teamsHtml=p.teams.map(tm=>{
      const s=totals(tm);
      const step=(k,cls)=>`<div class="step ${cls}"><span class="lab">${k.toUpperCase()}</span>
        <div class="ctl">
          <button data-id="${tm.id}" data-k="${k}" data-d="-1">−</button>
          <span class="val">${s[k]}</span>
          <button data-id="${tm.id}" data-k="${k}" data-d="1">+</button>
        </div></div>`;
      return `<div class="trow">
        <div class="flag">${tm.flag}</div>
        <div class="tinfo"><div class="tname">${tm.name}${tm.crown?' <span class="crown" title="Golden Team captain">👑</span>':''}</div>
          <div class="tier">Tier ${tm.tier} · <b>${TIERS[tm.tier]}</b></div></div>
        <div class="steppers">${step("gf","gf")}${step("ga","ga")}${step("yc","yc")}${step("rc","rc")}</div>
      </div>`;
    }).join("");
    return `<div class="card ${open?'open':''}" data-player="${p.name}">
      <div class="phead">
        <div class="rank ${i===0?'top':''}">${i+1}</div>
        <div class="pname">${p.name}${p.golden?' <span class="gtag">👑 Golden Squad</span>':''}</div>
        <div class="pstats">${stat("gf","gf")}${stat("ga","ga")}${stat("yc","yc")}${stat("rc","rc")}</div>
        <div class="chev">▶</div>
      </div>
      <div class="teams">${teamsHtml}</div>
    </div>`;
  }).join("");

  v.querySelectorAll(".phead").forEach(h=>h.onclick=()=>{
    const name=h.parentElement.dataset.player;
    if(openSet.has(name))openSet.delete(name);else openSet.add(name);
    h.parentElement.classList.toggle("open");
  });
  v.querySelectorAll(".step button").forEach(b=>b.onclick=(e)=>{
    e.stopPropagation();
    step(b.dataset.id,b.dataset.k,parseInt(b.dataset.d,10));
  });
}

/* ---------- Teams view ---------- */
function renderTeams(){
  const v=document.getElementById("view");
  const arr=[...ALL_TEAMS].sort((a,b)=>{
    if(teamSort.key==="name")return a.name.localeCompare(b.name)*teamSort.dir;
    if(teamSort.key==="tier")return (a.tier-b.tier)*teamSort.dir;
    return (totals(a)[teamSort.key]-totals(b)[teamSort.key])*teamSort.dir;
  });
  const head=`<thead><tr>
    <th class="l" data-s="name">Team</th>
    <th data-s="tier">Tier</th>
    <th data-s="gf">GF</th><th data-s="ga">GA</th><th data-s="yc">YC</th><th data-s="rc">RC</th>
  </tr></thead>`;
  const body=arr.map(t=>{const s=totals(t);return `<tr>
    <td class="l"><div class="tdteam"><span class="flag">${t.flag}</span><span><div>${t.name}${t.crown?' 👑':''}</div><div class="owner">${TEAM_OWNER[t.id]}</div></span></div></td>
    <td><span class="tag">T${t.tier}</span></td>
    <td class="v-gf">${s.gf}</td><td class="v-ga">${s.ga}</td><td class="v-yc">${s.yc}</td><td class="v-rc">${s.rc}</td>
  </tr>`;}).join("");
  v.innerHTML=`<table>${head}<tbody>${body}</tbody></table>`;
  v.querySelectorAll("th").forEach(th=>th.onclick=()=>{
    const k=th.dataset.s;
    if(teamSort.key===k)teamSort.dir*=-1;
    else teamSort={key:k,dir:(k==="name"||k==="tier")?1:-1};
    renderTeams();
  });
}

function step(id,k,d){
  if(!stats[id])stats[id]={gf:0,ga:0,yc:0,rc:0};
  stats[id][k]=Math.max(0,(stats[id][k]||0)+d);
  // update just the affected number nodes without full re-render to keep scroll/focus
  render();
  save();
}

function render(){
  renderSortbar();
  paintLed();
  paintUpdated();
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.view===view));
  if(view==="players")renderPlayers();else renderTeams();
  document.getElementById("footnote").innerHTML =
    'Results loaded through games of <b>Sun 14 Jun</b> (12 matches). Teams yet to play sit on zero. '+
    'Tap a player to log goals and cards as new matches finish — changes save automatically and are shared with everyone who opens this. '+
    (boardRef?'':'<b>⚠ Add your Firebase config to enable shared live syncing — until then this is a local preview only.</b>');
}

/* ---------- Summary ---------- */
function buildSummary(){
  const d=new Date();
  const rows=sortedPlayers();
  let out="🏆 World Cup 2026 Sweepstake\n"+d.toLocaleDateString(undefined,{weekday:"short",day:"numeric",month:"short"})+
    " · ranked by "+KEYS.find(x=>x[0]===playerSort)[1].toLowerCase()+"\n\n";
  rows.forEach(({p,t},i)=>{
    out+=`${i+1}. ${p.name} — ⚽${t.gf} scored · 🥅${t.ga} conceded · 🟨${t.yc} · 🟥${t.rc}\n`;
  });
  const g={gf:0,ga:0,yc:0,rc:0};ALL_TEAMS.forEach(tm=>{const s=totals(tm);g.gf+=s.gf;g.ga+=s.ga;g.yc+=s.yc;g.rc+=s.rc;});
  out+=`\nTournament totals: ⚽${g.gf} · 🟨${g.yc} · 🟥${g.rc}`;
  return out;
}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1600);}
async function copyText(txt){
  try{await navigator.clipboard.writeText(txt);return true;}catch(e){return false;}
}
async function openSummary(){
  const txt=buildSummary();
  document.getElementById("summaryText").value=txt;
  document.getElementById("overlay").classList.add("show");
  const ok=await copyText(txt);
  showToast(ok?"Copied to clipboard":"Select & copy the text");
  const ta=document.getElementById("summaryText");ta.focus();ta.select();
}

/* ---------- Wire up ---------- */
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{view=t.dataset.view;render();});
document.getElementById("copyBtn").onclick=openSummary;
document.getElementById("copyAgain").onclick=async()=>{const ok=await copyText(document.getElementById("summaryText").value);showToast(ok?"Copied":"Select & copy");};
document.getElementById("closeModal").onclick=()=>document.getElementById("overlay").classList.remove("show");
document.getElementById("overlay").onclick=(e)=>{if(e.target.id==="overlay")document.getElementById("overlay").classList.remove("show");};
document.getElementById("resetBtn").onclick=async()=>{
  if(!confirm("Reset every stat back to zero? This clears the shared scoreboard for everyone."))return;
  stats=blank();render();await save();showToast("All stats reset");
};

load();
</script>
</body>
</html>
